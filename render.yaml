# Render deployment configuration.
# Tells Render how to build and run this app.
# Reference: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: product-intelligence
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: product-intelligence-db
          property: connectionString

databases:
  - name: product-intelligence-db
    plan: free
    region: singapore
