<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; }
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }
  .pp-rank { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
  .fade-in { animation: fade .25s ease-out; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px);} to { opacity:1; transform:none;} }
  .spinner { border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { animation: toastIn .2s ease-out; }
  @keyframes toastIn { from { opacity:0; transform: translateY(-8px);} to { opacity:1; transform:none;} }
</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<!-- Toast container -->
<div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<!-- ============================ AUTH SCREEN ============================ -->
<div id="auth-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 p-8 fade-in">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-xl pp-rank flex items-center justify-center text-white font-bold">PI</div>
      <div>
        <h1 class="text-xl font-semibold">Product Intelligence</h1>
        <p class="text-sm text-slate-500">Customer signals → product decisions</p>
      </div>
    </div>
    <div class="flex gap-1 mb-5 bg-slate-100 p-1 rounded-lg">
      <button id="tab-login" class="flex-1 py-2 rounded-md text-sm font-medium bg-white shadow-sm">Sign in</button>
      <button id="tab-register" class="flex-1 py-2 rounded-md text-sm font-medium text-slate-600">Create account</button>
    </div>
    <form id="auth-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input id="auth-email" type="email" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="you@company.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input id="auth-password" type="password" required minlength="6" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="At least 6 characters" />
      </div>
      <button id="auth-submit" type="submit" class="w-full py-2.5 rounded-lg pp-rank text-white font-medium hover:opacity-90 transition flex items-center justify-center gap-2">
        <span id="auth-submit-text">Sign in</span>
      </button>
      <p id="auth-error" class="text-sm text-rose-600 hidden"></p>
    </form>
  </div>
</div>

<!-- ============================ APP SHELL ============================ -->
<div id="app-shell" class="hidden">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-60 bg-white border-r border-slate-200 flex flex-col">
      <div class="p-5 border-b border-slate-200">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg pp-rank flex items-center justify-center text-white font-bold text-sm">PI</div>
          <div class="font-semibold">Product Intel</div>
        </div>
      </div>
      <nav class="flex-1 p-3 space-y-1">
        <button data-view="dashboard" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 flex items-center gap-2">📊 Dashboard</button>
        <button data-view="datasets" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 flex items-center gap-2">📁 Datasets</button>
        <button data-view="query" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 flex items-center gap-2">💬 Ask anything</button>
        <button data-view="prds" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 flex items-center gap-2">📄 PRDs</button>
      </nav>
      <div class="p-3 border-t border-slate-200">

        <button id="logout-btn" class="w-full px-3 py-1.5 text-sm rounded-lg border border-slate-200 hover:bg-slate-100">Sign out</button>

    <!-- Main -->

Pricing page is confusing.

<script>
// ============================================================
//   API LAYER
// ============================================================
const API = {
  base: '/api',
  token() { return localStorage.getItem('token'); },
  setToken(t) { localStorage.setItem('token', t); },
  clearToken() { localStorage.removeItem('token'); },

  async req(method, path, body, isForm = false) {
    const headers = {};
    const token = this.token();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    if (!isForm && body !== undefined) headers['Content-Type'] = 'application/json';

    const res = await fetch(this.base + path, {
      method,
      headers,
      body: body === undefined ? undefined : (isForm ? body : JSON.stringify(body)),
    });
    if (res.status === 401) {
      this.clearToken();
      showAuth();
      throw new Error('Not authenticated');
    }
    const ct = res.headers.get('content-type') || '';
    let data;
    if (ct.includes('application/json')) data = await res.json();
    else data = await res.text();
    if (!res.ok) {
      const msg = (data && data.detail) ? data.detail : (typeof data === 'string' ? data : 'Request failed');
      throw new Error(msg);
    }
    return data;
  },
  get(p) { return this.req('GET', p); },
  post(p, body) { return this.req('POST', p, body); },
  del(p) { return this.req('DELETE', p); },
  postForm(p, formData) { return this.req('POST', p, formData, true); },
};

// ============================================================
//   STATE + ROUTER
// ============================================================
const state = {
  user: null,
  view: 'dashboard',
  datasets: [],
  selectedDatasetId: null,
  currentReport: null,
  currentPRDId: null,
  pendingPreview: null,
};

function showAuth() {
  $('#app-shell').classList.add('hidden');
  $('#auth-screen').classList.remove('hidden');
}
function showApp() {
  $('#auth-screen').classList.add('hidden');
  $('#app-shell').classList.remove('hidden');
}

// ============================================================
//   UTIL
// ============================================================
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return Array.from(root.querySelectorAll(sel)); }
function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstElementChild;
}
function clone(id) {
  const t = document.getElementById(id);
  return t.content.firstElementChild.cloneNode(true);
}
function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString(undefined, {year:'numeric', month:'short', day:'numeric'}); }
  catch { return iso; }
}
function toast(msg, type='info') {
  const colors = {info:'bg-slate-800', error:'bg-rose-600', success:'bg-emerald-600'};
  const t = el(`<div class="toast text-white text-sm px-4 py-2 rounded-lg shadow-lg ${colors[type]||colors.info}">${escapeHTML(msg)}</div>`);
  $('#toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function setButtonLoading(btn, loading, idleText) {
  if (!btn) return;
  if (loading) {
    btn.disabled = true;
    btn.dataset.idleText = btn.innerHTML;
    btn.innerHTML = `<span class="spinner inline-block align-middle"></span> <span class="ml-2 align-middle">Working…</span>`;
  } else {
    btn.disabled = false;
    btn.innerHTML = btn.dataset.idleText || idleText || 'Submit';
  }
}

// ============================================================
//   AUTH SCREEN
// ============================================================
let authMode = 'login';
$('#tab-login').addEventListener('click', () => { authMode = 'login'; updateAuthTabs(); });
$('#tab-register').addEventListener('click', () => { authMode = 'register'; updateAuthTabs(); });
function updateAuthTabs() {
  const isLogin = authMode === 'login';
  $('#tab-login').className = `flex-1 py-2 rounded-md text-sm font-medium ${isLogin ? 'bg-white shadow-sm' : 'text-slate-600'}`;
  $('#tab-register').className = `flex-1 py-2 rounded-md text-sm font-medium ${!isLogin ? 'bg-white shadow-sm' : 'text-slate-600'}`;
  $('#auth-submit-text').textContent = isLogin ? 'Sign in' : 'Create account';
}
$('#auth-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = $('#auth-email').value.trim();
  const password = $('#auth-password').value;
  const errEl = $('#auth-error');
  errEl.classList.add('hidden');
  const submitBtn = $('#auth-submit');
  submitBtn.disabled = true;
  try {
    const path = authMode === 'login' ? '/auth/login' : '/auth/register';
    const data = await API.post(path, { email, password });
    API.setToken(data.access_token);
    state.user = { email: data.email };
    await bootApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    submitBtn.disabled = false;
  }
});

// ============================================================
//   APP BOOT
// ============================================================
$('#logout-btn').addEventListener('click', () => {
  API.clearToken();
  state.user = null;
  showAuth();
});

async function bootApp() {
  try {
    if (!state.user) {
      const me = await API.get('/auth/me');
      state.user = me;
    }
    $('#user-email').textContent = state.user.email;
    showApp();
    await refreshDatasets();
    navigate('dashboard');
  } catch (e) {
    showAuth();
  }
}

$$('.nav-btn').forEach(btn => btn.addEventListener('click', () => navigate(btn.dataset.view)));

function navigate(view) {
  state.view = view;
  $$('.nav-btn').forEach(b => {
    if (b.dataset.view === view) b.classList.add('bg-indigo-50','text-indigo-700');
    else b.classList.remove('bg-indigo-50','text-indigo-700');
  });
  if (view === 'dashboard') renderDashboard();
  else if (view === 'datasets') renderDatasets();
  else if (view === 'query') renderQuery();
  else if (view === 'prds') renderPRDsList();
}

// ============================================================
//   DATASETS
// ============================================================
async function refreshDatasets() {
  state.datasets = await API.get('/intake/datasets');
  if (state.datasets.length && !state.selectedDatasetId) {
    state.selectedDatasetId = state.datasets[0].id;
  }
}

function renderDatasets() {
  const root = $('#view-container');
  root.innerHTML = '';
  root.appendChild(clone('tpl-datasets'));

  $('#csv-input').addEventListener('change', handleCSVUpload);

  // Drag & drop
  const dropLabel = $('#csv-input').closest('label');
  ['dragover', 'dragenter'].forEach(ev => dropLabel.addEventListener(ev, e => {
    e.preventDefault(); dropLabel.classList.add('border-indigo-400','bg-indigo-50/30');
  }));
  ['dragleave', 'drop'].forEach(ev => dropLabel.addEventListener(ev, e => {
    e.preventDefault(); dropLabel.classList.remove('border-indigo-400','bg-indigo-50/30');
  }));
  dropLabel.addEventListener('drop', e => {
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      $('#csv-input').files = e.dataTransfer.files;
      handleCSVUpload();
    }
  });

  $('#paste-save').addEventListener('click', handlePasteSave);
  renderDatasetList();
}

async function handleCSVUpload() {
  const file = $('#csv-input').files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    toast('Uploading…');
    const preview = await API.postForm('/intake/upload-csv', fd);
    state.pendingPreview = preview;
    state.pendingPreview.suggestedName = file.name.replace(/\.[^.]+$/, '');
    renderPreview();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    $('#csv-input').value = '';
  }
}

function renderPreview() {
  const p = state.pendingPreview;
  if (!p) return;

  // Insert preview before datasets list
  const existing = $('#preview-card');
  if (existing) existing.remove();

  const node = clone('tpl-csv-preview');
  node.id = 'preview-card';
  $('[data-slot=total]', node).textContent = p.total_rows;
  $('[data-slot=cleaned]', node).textContent = p.cleaned_count;
  $('[data-slot=dupes]', node).textContent = p.duplicate_count;
  $('[data-slot=textcol]', node).textContent = p.detected_text_column;

  const nameInput = $('#preview-name', node);
  nameInput.value = p.suggestedName || 'New dataset';

  const textSel = $('#preview-textcol', node);
  const labelSel = $('#preview-labelcol', node);
  labelSel.appendChild(el(`<option value="">(none)</option>`));
  for (const c of p.columns) {
    textSel.appendChild(el(`<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`));
    labelSel.appendChild(el(`<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`));
  }
  textSel.value = p.detected_text_column;
  if (p.detected_label_column) labelSel.value = p.detected_label_column;

  // Render preview table
  const table = $('#preview-table', node);
  const thead = el('<thead class="bg-slate-50"><tr></tr></thead>');
  for (const c of p.columns) {
    thead.querySelector('tr').appendChild(el(`<th class="px-3 py-2 text-left text-xs uppercase text-slate-500 font-medium">${escapeHTML(c)}</th>`));
  }
  table.appendChild(thead);
  const tbody = el('<tbody></tbody>');
  for (const row of p.preview_rows) {
    const tr = el('<tr class="border-t border-slate-100"></tr>');
    for (const c of p.columns) {
      const val = row[c] ?? '';
      tr.appendChild(el(`<td class="px-3 py-2 text-slate-700 align-top">${escapeHTML(String(val).slice(0, 200))}</td>`));
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);

  $('#preview-cancel', node).addEventListener('click', () => {
    state.pendingPreview = null;
    node.remove();
  });
  $('#preview-confirm', node).addEventListener('click', async () => {
    const btn = $('#preview-confirm', node);
    setButtonLoading(btn, true);
    try {
      await API.post('/intake/save', {
        upload_token: p.upload_token,
        name: nameInput.value.trim() || 'Untitled',
        text_column: textSel.value,
        label_column: labelSel.value || null,
      });
      toast('Dataset saved', 'success');
      state.pendingPreview = null;
      await refreshDatasets();
      renderDatasets();
    } catch (e) {
      toast(e.message, 'error');
      setButtonLoading(btn, false);
    }
  });

  // Insert at top of view
  const root = $('#view-container');
  root.insertBefore(node, root.firstChild);
}

async function handlePasteSave() {
  const name = $('#paste-name').value.trim();
  const text = $('#paste-text').value.trim();
  if (!text) { toast('Paste some text first', 'error'); return; }
  const btn = $('#paste-save');
  setButtonLoading(btn, true);
  try {
    await API.post('/intake/paste', { name: name || 'Pasted feedback', text });
    toast('Dataset created', 'success');
    $('#paste-name').value = '';
    $('#paste-text').value = '';
    await refreshDatasets();
    renderDatasetList();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    setButtonLoading(btn, false);
  }
}

function renderDatasetList() {
  const list = $('#datasets-list');
  if (!list) return;
  list.innerHTML = '';
  if (!state.datasets.length) {
    const empty = clone('tpl-empty');
    $('[data-slot=title]', empty).textContent = 'No datasets yet';
    $('[data-slot=subtitle]', empty).textContent = 'Upload a CSV or paste feedback to get started.';
    list.appendChild(empty);
    return;
  }
  for (const d of state.datasets) {
    const card = el(`
      <div class="bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-between hover:border-slate-300 transition">
        <div>
          <div class="font-medium">${escapeHTML(d.name)}</div>
          <div class="text-xs text-slate-500 mt-0.5">${d.row_count} items · ${escapeHTML(d.source_type.toUpperCase())} · ${fmtDate(d.created_at)}</div>
        </div>
        <div class="flex gap-2">
          <button data-id="${d.id}" class="ds-analyze px-3 py-1.5 text-sm pp-rank text-white rounded-lg hover:opacity-90">Analyze</button>
          <button data-id="${d.id}" class="ds-delete px-3 py-1.5 text-sm border border-slate-200 rounded-lg hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200">Delete</button>
        </div>
      </div>`);
    list.appendChild(card);
  }
  $$('.ds-analyze').forEach(b => b.addEventListener('click', () => {
    state.selectedDatasetId = parseInt(b.dataset.id, 10);
    navigate('dashboard');
    setTimeout(runAnalysis, 50);
  }));
  $$('.ds-delete').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Delete this dataset and all its insights?')) return;
    try {
      await API.del('/intake/datasets/' + b.dataset.id);
      await refreshDatasets();
      renderDatasetList();
      toast('Deleted', 'success');
    } catch (e) { toast(e.message, 'error'); }
  }));
}

let sentimentChart = null;

function renderDashboard() {
  const root = $('#view-container');
  root.innerHTML = '';
  root.appendChild(clone('tpl-dashboard'));

  const sel = $('#dashboard-dataset');
  if (!state.datasets.length) {
    sel.innerHTML = '<option>No datasets yet</option>';
    sel.disabled = true;
    $('#dashboard-run').disabled = true;
    const empty = clone('tpl-empty');
    $('[data-slot=title]', empty).textContent = 'No datasets to analyze';
    $('[data-slot=subtitle]', empty).innerHTML = 'Go to <a class="text-indigo-600 underline" href="#" id="go-datasets">Datasets</a> to upload feedback.';
    $('#dashboard-body').appendChild(empty);
    setTimeout(() => { const lk = $('#go-datasets'); if (lk) lk.addEventListener('click', e => { e.preventDefault(); navigate('datasets'); }); }, 0);
    return;
  }

  for (const d of state.datasets) {
    sel.appendChild(el(`<option value="${d.id}">${escapeHTML(d.name)} (${d.row_count})</option>`));
  }
  sel.value = state.selectedDatasetId || state.datasets[0].id;
  state.selectedDatasetId = parseInt(sel.value, 10);

  sel.addEventListener('change', async () => {
    state.selectedDatasetId = parseInt(sel.value, 10);
    await loadStoredReport();
  });
  $('#dashboard-run').addEventListener('click', runAnalysis);

  loadStoredReport();
}

async function loadStoredReport() {
  const body = $('#dashboard-body');
  body.innerHTML = '<div class="text-slate-500 text-sm">Loading…</div>';
  try {
    const report = await API.get('/insights/datasets/' + state.selectedDatasetId);
    state.currentReport = report;
    renderReport(report);
  } catch (e) {
    state.currentReport = null;
    body.innerHTML = '';
    const empty = clone('tpl-empty');
    $('[data-slot=title]', empty).textContent = 'No analysis yet';
    $('[data-slot=subtitle]', empty).textContent = 'Click "Run AI analysis" above to surface pain points and sentiment.';
    body.appendChild(empty);
  }
}

async function runAnalysis() {
  if (!state.selectedDatasetId) return;
  const btn = $('#dashboard-run');
  setButtonLoading(btn, true);
  $('#dashboard-body').innerHTML = `<div class="bg-white border border-slate-200 rounded-2xl p-12 text-center">
    <div class="spinner mx-auto mb-3"></div>
    <div class="text-slate-700 font-medium">Analyzing your customers…</div>
    <div class="text-xs text-slate-500 mt-1">This usually takes 10-30 seconds.</div>
  </div>`;
  try {
    const report = await API.post('/insights/datasets/' + state.selectedDatasetId + '/run');
    state.currentReport = report;
    renderReport(report);
    toast('Analysis complete', 'success');
  } catch (e) {
    toast(e.message, 'error');
    $('#dashboard-body').innerHTML = `<div class="bg-rose-50 border border-rose-200 text-rose-700 rounded-xl p-4 text-sm">${escapeHTML(e.message)}</div>`;
  } finally {
    setButtonLoading(btn, false);
  }
}

function renderReport(report) {
  const body = $('#dashboard-body');
  body.innerHTML = '';

  // KPI row
  const kpiRow = el(`
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-500">Feedback items</div>
        <div class="text-2xl font-semibold mt-1">${report.total_feedback}</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-500">Pain points found</div>
        <div class="text-2xl font-semibold mt-1">${report.pain_points.length}</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-500">Negative sentiment</div>
        <div class="text-2xl font-semibold mt-1 text-rose-600">${report.sentiment.negative ?? 0}%</div>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <div class="text-xs text-slate-500">Positive sentiment</div>
        <div class="text-2xl font-semibold mt-1 text-emerald-600">${report.sentiment.positive ?? 0}%</div>
      </div>
    </div>`);
  body.appendChild(kpiRow);

  // Two-column: pain points (left) + sentiment+trends+VOC (right)
  const grid = el(`<div class="grid grid-cols-1 lg:grid-cols-3 gap-5"></div>`);
  const left = el(`<div class="lg:col-span-2 space-y-4"></div>`);
  const right = el(`<div class="space-y-5"></div>`);
  grid.appendChild(left); grid.appendChild(right);
  body.appendChild(grid);

  // Pain points
  const ppHeader = el(`<h3 class="font-semibold mb-1">Top pain points</h3>`);
  left.appendChild(ppHeader);
  if (!report.pain_points.length) {
    left.appendChild(el(`<div class="bg-white border border-slate-200 rounded-xl p-4 text-sm text-slate-500">No pain points surfaced.</div>`));
  }
  for (const pp of report.pain_points) {
    const card = el(`
      <div class="bg-white border border-slate-200 rounded-2xl p-5 hover:border-slate-300 transition">
        <div class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-lg pp-rank text-white flex items-center justify-center font-bold flex-shrink-0">#${pp.rank}</div>
          <div class="flex-1">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="font-semibold text-lg leading-snug">${escapeHTML(pp.title)}</div>
                <div class="text-xs text-slate-500 mt-1">
                  <span class="inline-block bg-slate-100 px-2 py-0.5 rounded-full mr-1">${escapeHTML(pp.affected_users || 'Affected users')}</span>
                  <span class="inline-block bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full mr-1">${escapeHTML(pp.emotional_tone || 'Tone')}</span>
                  <span class="inline-block bg-slate-100 px-2 py-0.5 rounded-full">${pp.frequency} mention${pp.frequency===1?'':'s'}</span>
                </div>
              </div>
              <button data-id="${pp.id}" class="prd-gen-btn px-3 py-1.5 text-xs bg-slate-900 text-white rounded-lg hover:bg-slate-800 whitespace-nowrap">📄 Generate PRD</button>
            </div>
            <p class="text-slate-700 mt-3 text-sm leading-relaxed">${escapeHTML(pp.description)}</p>
            <div class="mt-3 p-3 bg-indigo-50/50 border border-indigo-100 rounded-lg">
              <div class="text-xs font-semibold text-indigo-700 uppercase tracking-wide mb-1">Recommendation</div>
              <div class="text-sm text-slate-800">${escapeHTML(pp.recommendation)}</div>
            </div>
            ${pp.citations && pp.citations.length ? `
            <details class="mt-3">
              <summary class="text-xs text-slate-600 cursor-pointer hover:text-slate-900">📌 ${pp.citations.length} supporting quote${pp.citations.length===1?'':'s'}</summary>
              <div class="mt-2 space-y-2">
                ${pp.citations.slice(0, 8).map(c => `
                  <blockquote class="border-l-2 border-slate-300 pl-3 py-1 text-sm text-slate-700 italic">
                    "${escapeHTML(c.content.length > 280 ? c.content.slice(0,280)+'…' : c.content)}"
                    ${c.user_label ? `<div class="text-xs text-slate-500 not-italic mt-1">— ${escapeHTML(c.user_label)}</div>` : ''}
                  </blockquote>
                `).join('')}
              </div>
            </details>` : ''}
          </div>
        </div>
      </div>`);
    left.appendChild(card);
  }
  $$('.prd-gen-btn', left).forEach(b => b.addEventListener('click', () => generatePRDFromInsight(parseInt(b.dataset.id, 10))));

  // Sentiment donut
  const sentBox = el(`
    <div class="bg-white border border-slate-200 rounded-2xl p-5">
      <div class="text-sm font-semibold mb-3">Sentiment</div>
      <div class="relative h-44"><canvas id="sentiment-chart"></canvas></div>
      <div class="grid grid-cols-3 gap-2 text-xs mt-3 text-center">
        <div><div class="w-3 h-3 rounded-full bg-emerald-500 inline-block mr-1 align-middle"></div>Positive ${report.sentiment.positive ?? 0}%</div>
        <div><div class="w-3 h-3 rounded-full bg-slate-300 inline-block mr-1 align-middle"></div>Neutral ${report.sentiment.neutral ?? 0}%</div>
        <div><div class="w-3 h-3 rounded-full bg-rose-500 inline-block mr-1 align-middle"></div>Negative ${report.sentiment.negative ?? 0}%</div>
      </div>
    </div>`);
  right.appendChild(sentBox);

  // Trending topics
  if (report.trending_topics && report.trending_topics.length) {
    const trending = el(`
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <div class="text-sm font-semibold mb-3">Trending topics</div>
        <div class="flex flex-wrap gap-2">
          ${report.trending_topics.map((t,i) => `<span class="text-xs px-2.5 py-1 rounded-full ${i===0?'bg-indigo-100 text-indigo-700':'bg-slate-100 text-slate-700'}">${escapeHTML(t)}</span>`).join('')}
        </div>
      </div>`);
    right.appendChild(trending);
  }

  // Voice of customer (mix from citations)
  const allQuotes = [];
  for (const pp of report.pain_points) {
    for (const c of (pp.citations || []).slice(0, 2)) allQuotes.push(c);
    if (allQuotes.length > 6) break;
  }
  if (allQuotes.length) {
    const voc = el(`
      <div class="bg-white border border-slate-200 rounded-2xl p-5">
        <div class="text-sm font-semibold mb-3">Voice of customer</div>
        <div class="space-y-3">
          ${allQuotes.slice(0,6).map(c => `
            <div class="text-sm border-l-2 border-indigo-300 pl-3 italic text-slate-700">
              "${escapeHTML(c.content.length > 180 ? c.content.slice(0,180)+'…' : c.content)}"
              ${c.user_label ? `<div class="not-italic text-xs text-slate-500 mt-1">— ${escapeHTML(c.user_label)}</div>` : ''}
            </div>`).join('')}
        </div>
      </div>`);
    right.appendChild(voc);
  }

  // Render donut chart after DOM
  setTimeout(() => {
    const canvas = $('#sentiment-chart');
    if (!canvas) return;
    if (sentimentChart) sentimentChart.destroy();
    sentimentChart = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: ['Positive', 'Neutral', 'Negative'],
        datasets: [{
          data: [report.sentiment.positive || 0, report.sentiment.neutral || 0, report.sentiment.negative || 0],
          backgroundColor: ['#10b981', '#cbd5e1', '#f43f5e'],
          borderWidth: 0,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '65%',
        plugins: { legend: { display: false } },
      },
    });
  }, 30);
}

    sel.innerHTML = '<option>No datasets yet — upload one first</option>';

async function submitQuery() {

    }

              <div class="font-medium">${escapeHTML(p.title)}</div>

async function openPRD(prdId) {
  state.currentPRDId = prdId;
  const root = $('#view-container');
  root.innerHTML = '<div class="text-sm text-slate-500">Loading PRD…</div>';
  try {
    const [prd, tasks] = await Promise.all([
      API.get('/prd/' + prdId),
      API.get('/prd/' + prdId + '/tasks').catch(() => []),
    ]);
    root.innerHTML = '';
    const node = clone('tpl-prd-detail');
    $('[data-slot=title]', node).textContent = prd.title;
    $('[data-slot=meta]', node).textContent = 'Created ' + fmtDate(prd.created_at);
    $('[data-slot=problem]', node).textContent = prd.problem_statement;
    $('[data-slot=who]', node).textContent = prd.who_affected;
    fillUL($('[data-slot=metrics]', node), prd.success_metrics);
    fillUL($('[data-slot=stories]', node), prd.user_stories);
    fillUL($('[data-slot=ac]', node), prd.acceptance_criteria);

    $('#prd-back', node).addEventListener('click', () => navigate('prds'));
    $('#prd-export-pdf', node).addEventListener('click', () => downloadAuth('/api/prd/' + prdId + '/export.pdf'));
    $('#prd-export-md', node).addEventListener('click', () => downloadAuth('/api/prd/' + prdId + '/export.md'));
    $('#prd-gen-tasks', node).addEventListener('click', async () => {
      const btn = $('#prd-gen-tasks', node);
      setButtonLoading(btn, true);
      try {
        const t = await API.post('/prd/' + prdId + '/tasks');
        renderTasks(t, node);
        toast('Dev tasks generated', 'success');
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        setButtonLoading(btn, false);
      }
    });

    if (tasks && tasks.length) renderTasks(tasks, node);

    root.appendChild(node);
  } catch (e) {
    root.innerHTML = `<div class="text-rose-600 text-sm">${escapeHTML(e.message)}</div>`;
  }
}

function fillUL(ul, items) {
  ul.innerHTML = '';
  if (!items || !items.length) {
    ul.innerHTML = '<li class="text-slate-400">—</li>';
    return;
  }
  for (const it of items) {
    ul.appendChild(el(`<li class="text-slate-700">${escapeHTML(it)}</li>`));
  }
}

function renderTasks(tasks, root) {
  const sec = $('#prd-tasks-section', root);
  const list = $('#prd-tasks-list', root);
  sec.classList.remove('hidden');
  list.innerHTML = '';
  if (!tasks.length) {
    list.innerHTML = '<div class="text-sm text-slate-500">No tasks yet.</div>';
    return;
  }
  // Add download-as-list button
  const dlBtn = el(`<button class="text-xs px-3 py-1.5 border border-slate-200 rounded-lg hover:bg-slate-50 mb-3">⬇️ Download tasks (.txt)</button>`);
  dlBtn.addEventListener('click', () => downloadTasksTxt(tasks));
  list.appendChild(dlBtn);

  tasks.forEach((t, i) => {
    const card = el(`
      <div class="border border-slate-200 rounded-xl p-4">
        <div class="flex items-start gap-3">
          <div class="w-7 h-7 rounded-md bg-slate-100 text-slate-600 flex items-center justify-center text-sm font-medium flex-shrink-0">${i+1}</div>
          <div class="flex-1">
            <div class="font-medium">${escapeHTML(t.title)}</div>
            <p class="text-sm text-slate-600 mt-1 leading-relaxed">${escapeHTML(t.context)}</p>
            ${t.acceptance_criteria && t.acceptance_criteria.length ? `
              <div class="mt-2">
                <div class="text-xs text-slate-500 mb-1">Acceptance criteria</div>
                <ul class="list-disc list-inside text-sm text-slate-700 space-y-0.5">
                  ${t.acceptance_criteria.map(c => `<li>${escapeHTML(c)}</li>`).join('')}
                </ul>
              </div>` : ''}
          </div>
        </div>
      </div>`);
    list.appendChild(card);
  });
}

function downloadTasksTxt(tasks) {
  const lines = [];
  tasks.forEach((t, i) => {
    lines.push(`### ${i+1}. ${t.title}`);
    lines.push('');
    lines.push(t.context || '');
    if (t.acceptance_criteria && t.acceptance_criteria.length) {
      lines.push('');
      lines.push('Acceptance criteria:');
      t.acceptance_criteria.forEach(c => lines.push(`- ${c}`));
    }
    lines.push('');
    lines.push('---');
    lines.push('');
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dev-tasks.txt'; a.click();
  URL.revokeObjectURL(url);
}

async function downloadAuth(path) {
  const res = await fetch(path, { headers: { 'Authorization': 'Bearer ' + API.token() } });
  if (!res.ok) { toast('Download failed', 'error'); return; }
  const cd = res.headers.get('content-disposition') || '';
  const m = cd.match(/filename="?([^"]+)"?/);
  const filename = m ? m[1] : 'download';
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
//   ENTRYPOINT
// ============================================================
(async function init() {
  if (API.token()) {
    try { await bootApp(); }
    catch { showAuth(); }
  } else {
    showAuth();
  }
})();
</script>
